name: Deploy to GitHub Pages

on:
  push:
    branches: [main, engineering-phase1]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install dependencies
        run: |
          cd course-timetable
          npm ci
      
      - name: Build
        run: |
          cd course-timetable
          npm run build
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./course-timetable/dist
      
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
