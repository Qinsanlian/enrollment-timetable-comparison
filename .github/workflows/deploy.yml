name: Deploy to GitHub Pages
on:
  push:
    branches: [main, engineering-phase1]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ✅ 直接使用 v5，告别 Node.js 20 弃用警告
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          cd course-timetable
          npm ci

      - name: Build
        run: |
          cd course-timetable
          npm run build

      # ✅ 用 v5 并加上 enablement: true，强力启用 Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./course-timetable/dist

      # ✅ 使用最新版 v5
      - id: deployment
        uses: actions/deploy-pages@v5
